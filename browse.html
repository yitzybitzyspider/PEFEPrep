<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank — PEFEPrep</title>
  <meta name="description" content="Browse, search, and review every FE Environmental question by topic and mastery." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>" />
  <link rel="stylesheet" href="./app/style.css?v=0.9.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <a class="brand" href="./index.html">PEFE<span>Prep</span></a>
      <nav class="navlinks">
        <a href="./today.html">Today</a>
        <a href="./browse.html" class="active">Bank</a>
        <a href="./resources.html">PDFs</a>
        <a href="./progress.html">Progress</a>
        <a href="./settings.html">Settings</a>
      </nav>
    </header>

    <section class="card">
      <h1>Question bank</h1>
      <p class="sub">Filter by day, topic, or mastery and search. Reveal any answer in place, or hit <strong>Review these →</strong> to step through the current filter in the full study interface.</p>
      <div class="filters">
        <select id="fDay" class="sel"></select>
        <select id="fTopic"></select>
        <input id="fSearch" type="search" placeholder="Search questions…" />
        <button class="reviewbtn" id="reviewBtn">Review these →</button>
      </div>
      <div class="seg" data-seg="status" style="margin-top:10px;width:fit-content;flex-wrap:wrap;">
        <button data-v="all" class="on">All</button>
        <button data-v="unseen">Unseen</button>
        <button data-v="learning">Learning</button>
        <button data-v="mastered">Mastered</button>
        <button data-v="missed">Missed</button>
      </div>
      <div class="sub" id="count" style="margin-top:14px;font-size:13px;"></div>
    </section>

    <div id="list"></div>

    <footer><a href="./index.html">pefeprep.com</a></footer>
  </div>

  <script src="./app/math.js?v=0.9.0"></script>
  <script src="./app/store.js?v=0.9.0"></script>
  <script src="./app/data.js?v=0.9.0"></script>
  <script src="./app/browse.js?v=0.9.0"></script>
  <script src="./app/version.js?v=0.9.0"></script>
</body>
</html>
