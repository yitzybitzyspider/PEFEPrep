<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Plan — PEFEPrep</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>" />
  <link rel="stylesheet" href="./app/style.css?v=0.20.1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    .hero{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
    .countbig{font-size:32px;font-weight:800;color:var(--accent);letter-spacing:-.02em;}
    .kindtag{display:inline-block;font-size:12px;font-weight:700;padding:3px 11px;border-radius:999px;}
    .kind-study{background:rgba(76,139,245,.16);color:#bcd2ff;}
    .kind-mini_exam{background:rgba(245,166,35,.18);color:#ffd98a;}
    .kind-final_mock{background:rgba(247,109,109,.18);color:#ffb3b3;}
    .kind-exam{background:rgba(62,207,142,.18);color:#9be9c4;}
    .kind-review{background:rgba(245,166,35,.16);color:#ffd98a;}
    .strip{display:flex;gap:3px;flex-wrap:wrap;margin-top:12px;}
    .scell{width:15px;height:15px;border-radius:4px;background:var(--card2);border:1px solid var(--line);}
    .scell.study{background:rgba(76,139,245,.35);border-color:transparent;}
    .scell.mini_exam{background:rgba(245,166,35,.55);border-color:transparent;}
    .scell.final_mock{background:rgba(247,109,109,.55);border-color:transparent;}
    .scell.exam{background:rgba(62,207,142,.6);border-color:transparent;}
    .scell.today{outline:2px solid var(--accent);outline-offset:1px;}
    .scell.done{opacity:.4;}
    .opt.pick{cursor:pointer;}
    .qprog{font-size:13px;color:var(--muted);margin-top:6px;}
    .qtype{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:1px 9px;}
    .qconcept{color:var(--ink);}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <a class="brand" href="./index.html">PEFE<span>Prep</span></a>
      <nav class="navlinks">
        <a href="./bank-live.html">✦ Live</a>
        <a href="./dashboard.html" class="active">My Plan</a>
        <a href="./account.html">Account</a>
      </nav>
    </header>

    <div id="root"><section class="card"><p class="sub">Loading your plan…</p></section></div>

    <footer><a href="./index.html">pefeprep.com</a></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app/math.js?v=0.20.1"></script>
  <script src="./app/sb.js?v=0.20.1"></script>
  <script src="./app/report.js?v=0.20.1"></script>
  <script src="./app/dashboard.js?v=0.20.1"></script>
</body>
</html>
