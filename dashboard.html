<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Plan — PEFEPrep</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>" />
  <link rel="stylesheet" href="./app/style.css?v=0.16.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    .hero{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
    .countbig{font-size:30px;font-weight:800;color:#4338ca;}
    .kindtag{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;}
    .kind-study{background:#e0e7ff;color:#4338ca;} .kind-mini_exam{background:#fde68a;color:#92400e;}
    .kind-final_mock{background:#fca5a5;color:#7f1d1d;} .kind-exam{background:#34d399;color:#064e3b;}
    .strip{display:flex;gap:3px;flex-wrap:wrap;margin-top:10px;}
    .scell{width:14px;height:14px;border-radius:3px;background:#eef2f7;}
    .scell.study{background:#c7d2fe;} .scell.mini_exam{background:#fcd34d;} .scell.final_mock{background:#f87171;}
    .scell.exam{background:#34d399;} .scell.today{outline:2px solid #4338ca;outline-offset:1px;}
    .scell.done{opacity:.45;}
    .opt.pick{cursor:pointer;} .opt.pick:hover{background:#f1f5f9;}
    .opt.right{background:#dcfce7 !important;border-color:#86efac;} .opt.wrong{background:#fee2e2 !important;border-color:#fca5a5;}
    .qprog{font-size:13px;color:#64748b;}
    .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;}
    .stat .num{font-size:24px;font-weight:800;color:#0f172a;}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <a class="brand" href="./index.html">PEFE<span>Prep</span></a>
      <nav class="navlinks">
        <a href="./bank-live.html">✦ Live</a>
        <a href="./dashboard.html" class="active">My Plan</a>
        <a href="./account.html">Account</a>
      </nav>
    </header>

    <div id="root"><section class="card"><p class="sub">Loading your plan…</p></section></div>

    <footer><a href="./index.html">pefeprep.com</a></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app/math.js?v=0.16.0"></script>
  <script src="./app/sb.js?v=0.16.0"></script>
  <script src="./app/dashboard.js?v=0.16.0"></script>
</body>
</html>
