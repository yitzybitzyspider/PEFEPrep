<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today — PEFEPrep</title>
  <meta name="description" content="Your daily FE Environmental set: recall, reveal, self-grade, keep your streak." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>" />
  <link rel="stylesheet" href="./app/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="appbar">
      <a class="brand" href="./index.html">PEFE<span>Prep</span></a>
      <nav class="navlinks">
        <a href="./today.html" class="active">Today</a>
        <a href="./progress.html">Progress</a>
        <a href="./settings.html">Settings</a>
      </nav>
    </header>

    <!-- INTRO -->
    <section id="intro" class="card">
      <div class="headmeta" style="margin-bottom:14px;">
        <span class="tag count" id="countdown">—</span>
        <span class="tag streak" id="streakChip">🔥 0 day streak</span>
        <span class="tag">FE Environmental · Demo</span>
      </div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:6px;" id="dateLabel"></div>
      <h1 id="introTitle">Today’s set</h1>
      <p class="sub" id="introSub"></p>
      <div class="meta-row" id="introMeta"></div>
      <div class="btn-row">
        <button class="btn-primary" id="startBtn">Start →</button>
        <a class="btn-ghost" href="./progress.html">View progress</a>
      </div>
    </section>

    <!-- PLAYER -->
    <section id="player" class="card hide">
      <div class="progress"><div id="bar"></div></div>
      <div class="qhead">
        <span id="qcount"></span>
        <span class="topic-tag" id="qtopic"></span>
      </div>
      <div class="stem" id="stem"></div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="btn-primary" id="revealBtn">Reveal answer</button>
        <button class="btn-primary hide" id="nextBtn">Next →</button>
      </div>
      <div class="hint"><kbd>1</kbd>–<kbd>4</kbd> pick · <kbd>space</kbd> reveal · <kbd>enter</kbd> next</div>
    </section>

    <!-- DONE -->
    <section id="done" class="card hide">
      <span class="tag streak" style="display:inline-block;">Done for today</span>
      <div class="scorebig"><span id="doneScore"></span><small id="doneTotal"></small></div>
      <p class="sub" id="doneMsg"></p>
      <div class="tag streak" id="doneStreak" style="display:inline-block;margin-bottom:16px;">🔥 0 day streak</div>
      <h2>By topic</h2>
      <div id="doneTopics"></div>
      <div class="btn-row">
        <button class="btn-primary" id="againBtn">Review again</button>
        <a class="btn-ghost" href="./progress.html">See progress</a>
      </div>
    </section>

    <footer>
      Demo content for the build — your Handbook-verified FE&nbsp;Environmental set drops in here.
      &nbsp;·&nbsp; <a href="./index.html">pefeprep.com</a>
    </footer>
  </div>

  <script src="./app/store.js"></script>
  <script src="./app/today.js"></script>
</body>
</html>
