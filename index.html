<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEFEPrep — FE &amp; PE Exam Prep</title>
  <meta name="description" content="Drills, practice exams, and progress tracking for the NCEES Fundamentals of Engineering (FE) and Professional Engineering (PE) exams." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #121c2e;
      --ink: #e8eef7;
      --muted: #93a1b8;
      --accent: #f5a623;
      --accent2: #4c8bf5;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 70% -10%, rgba(76,139,245,0.18), transparent 60%),
        radial-gradient(900px 500px at 10% 110%, rgba(245,166,35,0.12), transparent 55%),
        var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { width: 100%; max-width: 640px; text-align: center; }
    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(245,166,35,0.35);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(40px, 9vw, 72px);
      margin: 0 0 8px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    h1 span { color: var(--accent); }
    .tag { font-size: clamp(16px, 3.4vw, 20px); color: var(--muted); margin: 0 auto 32px; max-width: 30ch; line-height: 1.5; }
    .feats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 36px;
    }
    .feat {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 14px;
      color: var(--ink);
    }
    .feat b { color: var(--accent2); display: block; font-size: 15px; margin-bottom: 2px; }
    .foot { color: var(--muted); font-size: 13px; }
    .pulse {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); margin-right: 8px; vertical-align: middle;
      box-shadow: 0 0 0 0 rgba(245,166,35,0.6); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(245,166,35,0.5); }
      70% { box-shadow: 0 0 0 10px rgba(245,166,35,0); }
      100% { box-shadow: 0 0 0 0 rgba(245,166,35,0); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="badge">FE &amp; PE Exam Prep</div>
    <h1>PEFE<span>Prep</span></h1>
    <p class="tag">Drills, practice exams, and progress tracking for the engineering licensure exams.</p>
    <div class="feats">
      <div class="feat"><b>Drills</b>Targeted practice by topic</div>
      <div class="feat"><b>Practice Exams</b>Full-length, timed</div>
      <div class="feat"><b>Progress</b>See where you stand</div>
    </div>
    <a href="./today.html" style="display:inline-block;background:var(--accent);color:#1a1205;font-weight:700;text-decoration:none;padding:13px 26px;border-radius:12px;font-size:15px;margin-bottom:14px;">Start today’s set →</a>
    <div style="margin-bottom:18px;"><a href="./practice.html" style="color:var(--accent2);text-decoration:none;font-size:13.5px;">or try a quick practice drill</a></div>
    <p class="foot"><span class="pulse"></span>Full launch coming soon</p>
  </main>
</body>
</html>
